      </div>

    <section class="works-detail__gallery">
      <div class="works-detail__inner works-detail__inner--gallery">
        <figure class="works-detail__image works-detail__image--pc">
          <img src="./img/top_page.jpeg" alt="PCサイト画像">

        </figure>

        <figure class="works-detail__image works-detail__image--sp">
